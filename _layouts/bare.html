<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.7;
        color: #333;
        background: #fff;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }
      h1, h2, h3, h4 { color: #111; line-height: 1.3; }
      h1 { font-size: 2em; margin-top: 0; }
      h2 { font-size: 1.5em; margin-top: 2em; padding-bottom: .3em; border-bottom: 1px solid #eaecef; }
      h3 { font-size: 1.2em; margin-top: 1.5em; }
      a { color: #0366d6; text-decoration: none; }
      a:hover { text-decoration: underline; }
      hr { border: 0; border-top: 1px solid #eaecef; margin: 2em 0; }
      table { border-collapse: collapse; width: 100%; margin: 1em 0; display: block; overflow-x: auto; }
      th, td { border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }
      th { background: #f6f8fa; }
      code { background: #f6f8fa; padding: .2em .4em; border-radius: 3px; font-size: 85%; }
      ul, ol { padding-left: 1.5em; }
      li { margin: .25em 0; }
      strong { color: #111; }
      em { color: #555; }
    </style>
  </head>
  <body>
    <main class="container">
      {{ content }}
    </main>
  </body>
</html>
